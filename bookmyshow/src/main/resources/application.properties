spring.application.name=bookmyshow

spring.datasource.url=jdbc:mysql://mysql:3306/bookmyshow?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=redis
spring.data.redis.port=6379

jwt.secret=bookmyshow_super_secret_key_nithin_2024_minimum_256_bits
jwt.expiration=86400000

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.connection-test-query=SELECT 1